<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — SVI Infra Solutions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb; color: #111827;
      padding: 1rem;
    }
    .card {
      text-align: center; max-width: 420px; width: 100%;
      background: white; border-radius: 16px;
      padding: 3rem 2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: #111827; }
    p { color: #6b7280; line-height: 1.6; font-size: 0.9375rem; margin-bottom: 2rem; }
    .btn {
      display: inline-block; background: #111827; color: white;
      text-decoration: none; padding: 0.75rem 2rem; border-radius: 10px;
      font-size: 0.875rem; font-weight: 600; transition: background 0.2s;
      border: none; cursor: pointer;
    }
    .btn:hover { background: #1f2937; }
    .btn:active { transform: scale(0.97); }
    .hint { margin-top: 1.5rem; font-size: 0.75rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <span class="icon" aria-hidden="true">📡</span>
    <h1>You're Offline</h1>
    <p>Connect to the internet and try again. Previously viewed pages are still available from your cache.</p>
    <button class="btn" onclick="window.location.reload()" id="retryBtn">Retry</button>
    <p class="hint">SVI Infra Solutions — Premium Real Estate Developer</p>
  </div>
  <script>
    // Auto-retry once connection is back
    if ('onLine' in navigator) {
      window.addEventListener('online', () => { window.location.reload(); });
    }
  </script>
</body>
</html>
